openapi: 3.0.3
info:
  title: Diet AI System API
  version: 1.0.0
  description: "\n## AI 飲食控制系統\n\n這個 API 提供以下功能：\n- 使用者註冊 / 登入（JWT 認證）\n- 飲食日記 CRUD\n-
    食物營養資料庫\n- AI 飲食分析建議\n    "
paths:
  /api/v1/ai/analyze/{diary_id}/:
    post:
      operationId: v1_ai_analyze_create
      description: 針對指定日誌呼叫 AI 進行營養分析，結果會存入資料庫。若已有分析結果，直接回傳不重複呼叫 AI。
      summary: 分析飲食日誌
      parameters:
      - in: path
        name: diary_id
        schema:
          type: integer
        required: true
      tags:
      - AI 分析
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIAnalysis'
          description: ''
        '404':
          description: 找不到該筆資料
        '500':
          description: AI 分析失敗
  /api/v1/ai/my-analyses/:
    get:
      operationId: v1_ai_my_analyses_list
      description: |-
        GET /api/ai/my-analyses/
        取得我所有AI分析的紀錄
      summary: 取得我的分析紀錄
      tags:
      - AI 分析
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIAnalysis'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: 輸入帳密，取的 access token 和 refresh token。access token 有效期限 5 分鐘。
      summary: 登入 (取得 JWT Token)
      tags:
      - 認證
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: 建立新帳號。username 必須唯一，密碼至少 8 字元。
      summary: 使用者註冊
      tags:
      - 認證
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
            examples:
              基本範例:
                value:
                  username: john_doe
                  email: john@example.com
                  password: Pass123!
                  password_confirm: Pass123!
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
              examples:
                成功回應:
                  value:
                    username: john_doe
                    email: admin@example.com
          description: 註冊成功
        '400':
          description: 資料驗證失敗 (帳號重複或密碼不符)
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: 用 refresh token 取的新的 access token，無須重新登入。
      summary: 刷新 Access Token
      tags:
      - 認證
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/diary/:
    get:
      operationId: v1_diary_list
      summary: 日記列表
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - 飲食日記
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDiaryEntryList'
          description: ''
    post:
      operationId: v1_diary_create
      summary: 新增飲食日記
      tags:
      - 飲食日記
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiaryEntry'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiaryEntry'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiaryEntry'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryEntry'
          description: ''
  /api/v1/diary/{id}/:
    get:
      operationId: v1_diary_retrieve
      summary: 取得單一飲食日記
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - 飲食日記
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryEntry'
          description: ''
    patch:
      operationId: v1_diary_partial_update
      summary: 更新飲食日記
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - 飲食日記
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDiaryEntry'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDiaryEntry'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDiaryEntry'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiaryEntry'
          description: ''
    delete:
      operationId: v1_diary_destroy
      summary: 刪除日記
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - 飲食日記
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/foods/:
    get:
      operationId: v1_foods_list
      description: '取得所有食物資料。支援搜尋: ?search={search_keyword}'
      summary: 食物列表
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: 搜尋食物名稱或分類
      tags:
      - 食物資料庫
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFoodList'
          description: ''
    post:
      operationId: v1_foods_create
      description: |-
        ViewSet = 把 list/create/retrieve/update/destroy 全包在一起
        一個class處理所有CRUD，這樣就不用寫多個view
      summary: 新增食物
      tags:
      - 食物資料庫
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Food'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Food'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Food'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
          description: ''
  /api/v1/foods/{id}/:
    get:
      operationId: v1_foods_retrieve
      description: |-
        ViewSet = 把 list/create/retrieve/update/destroy 全包在一起
        一個class處理所有CRUD，這樣就不用寫多個view
      summary: 取得單一食物
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this 食物資料庫.
        required: true
      tags:
      - 食物資料庫
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
          description: ''
    put:
      operationId: v1_foods_update
      description: |-
        ViewSet = 把 list/create/retrieve/update/destroy 全包在一起
        一個class處理所有CRUD，這樣就不用寫多個view
      summary: 完整更新食物
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this 食物資料庫.
        required: true
      tags:
      - 食物資料庫
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Food'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Food'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Food'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
          description: ''
    patch:
      operationId: v1_foods_partial_update
      description: |-
        ViewSet = 把 list/create/retrieve/update/destroy 全包在一起
        一個class處理所有CRUD，這樣就不用寫多個view
      summary: 部分更新食物
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this 食物資料庫.
        required: true
      tags:
      - 食物資料庫
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedFood'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFood'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFood'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
          description: ''
    delete:
      operationId: v1_foods_destroy
      description: |-
        ViewSet = 把 list/create/retrieve/update/destroy 全包在一起
        一個class處理所有CRUD，這樣就不用寫多個view
      summary: 刪除食物
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this 食物資料庫.
        required: true
      tags:
      - 食物資料庫
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/users/me/:
    get:
      operationId: v1_users_me_retrieve
      description: 取得目前登入使用者的完整資料，包含BMI計算結果
      summary: 取得個人資料
      tags:
      - 使用者
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: v1_users_me_update
      description: |-
        GET/PATCH /api/users/me/
        RetrieveUpdateAPIView = 處理讀取與更新
      tags:
      - 使用者
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfile'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: v1_users_me_partial_update
      description: 更新身高、體重、飲食目標等資料。只需傳入要更新的欄位。
      summary: 更新個人資料
      tags:
      - 使用者
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
components:
  schemas:
    AIAnalysis:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        diary_entry:
          type: integer
          description: 一筆紀錄只對應一份 AI 分析結果
        summary:
          type: string
          description: AI 分析結果
        suggestions:
          description: AI 分析建議
        nutrition_score:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: 營養評分 1-100
        status:
          allOf:
          - $ref: '#/components/schemas/AIAnalysisStatusEnum'
          description: |-
            狀態

            * `pending` - 待分析
            * `processing` - 分析中
            * `completed` - 完成
            * `failed` - 失敗
        ai_model_used:
          type: string
          description: 使用的 AI 模型(gpt-4o / gemini-pro)
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - ai_model_used
      - created_at
      - diary_entry
      - id
      - summary
    AIAnalysisStatusEnum:
      enum:
      - pending
      - processing
      - completed
      - failed
      type: string
      description: |-
        * `pending` - 待分析
        * `processing` - 分析中
        * `completed` - 完成
        * `failed` - 失敗
    CategoryEnum:
      enum:
      - grain
      - protein
      - vegetable
      - fruit
      - dairy
      - fat
      - beverage
      - other
      type: string
      description: |-
        * `grain` - 主食/穀類
        * `protein` - 蛋白質
        * `vegetable` - 蔬菜
        * `fruit` - 水果
        * `dairy` - 乳製品
        * `fat` - 油脂
        * `beverage` - 飲料
        * `other` - 其他
    DiaryEntry:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
          description: 紀錄日期
        meal_type:
          allOf:
          - $ref: '#/components/schemas/MealTypeEnum'
          description: |-
            餐別

            * `breakfast` - 早餐
            * `lunch` - 午餐
            * `dinner` - 晚餐
            * `snack` - 點心
        meal_type_display:
          type: string
          readOnly: true
        food_name:
          type: string
          description: 食物名稱，例如:雞腿便當、綠茶
          maxLength: 200
        portion_description:
          type: string
          description: 分量描述，例如:一碗、半碗、一杯
          maxLength: 200
        image:
          type: string
          format: uri
          nullable: true
          description: 食物照片(AI辨識使用)
        remark:
          type: string
          description: 備註
        calories:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析熱量 (kcal)
        protein:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析蛋白質 (g)
        fat:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析脂肪 (g)
        saturated_fat:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析飽和脂肪 (g)
        trans_fat:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析反式脂肪 (g)
        carbohydrates:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析碳水化合物 (g)
        sugar:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析糖 (g)
        sodium:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: AI分析納 (g)
        status:
          allOf:
          - $ref: '#/components/schemas/DiaryEntryStatusEnum'
          readOnly: true
          description: |-
            AI分析狀態

            * `pending` - 等待分析
            * `completed` - 分析完成
            * `failed` - 分析失敗
        status_display:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: 建立時間
      required:
      - calories
      - carbohydrates
      - created_at
      - date
      - fat
      - food_name
      - id
      - meal_type
      - meal_type_display
      - protein
      - saturated_fat
      - sodium
      - status
      - status_display
      - sugar
      - trans_fat
    DiaryEntryStatusEnum:
      enum:
      - pending
      - completed
      - failed
      type: string
      description: |-
        * `pending` - 等待分析
        * `completed` - 分析完成
        * `failed` - 分析失敗
    Food:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: 食物名稱
          maxLength: 100
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          description: |-
            食物類別

            * `grain` - 主食/穀類
            * `protein` - 蛋白質
            * `vegetable` - 蔬菜
            * `fruit` - 水果
            * `dairy` - 乳製品
            * `fat` - 油脂
            * `beverage` - 飲料
            * `other` - 其他
        calories_per_100g:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          description: 熱量 (g / 100g)
        protein_per_100g:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          description: 蛋白質 (g / 100g)
        carbs_per_100g:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          description: 碳水化合物 (g / 100g)
        fat_per_100g:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          description: 脂肪 (g / 100g)
        fiber_per_100g:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
          description: 膳食纖維 (g / 100g)
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: 建立時間
      required:
      - calories_per_100g
      - carbs_per_100g
      - created_at
      - fat_per_100g
      - id
      - name
      - protein_per_100g
    GoalEnum:
      enum:
      - lose_weight
      - maintain
      - gain_muscle
      type: string
      description: |-
        * `lose_weight` - 減重
        * `maintain` - 維持體重
        * `gain_muscle` - 增肌
    MealTypeEnum:
      enum:
      - breakfast
      - lunch
      - dinner
      - snack
      type: string
      description: |-
        * `breakfast` - 早餐
        * `lunch` - 午餐
        * `dinner` - 晚餐
        * `snack` - 點心
    PaginatedDiaryEntryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/DiaryEntry'
    PaginatedFoodList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Food'
    PatchedDiaryEntry:
      type: object
      properties:
        id:
          type: integer
