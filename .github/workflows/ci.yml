name: CI Pipeline

# 觸發條件：push 到任何分支，或 PR 到 develop/main
on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: 測試與程式碼檢查
    runs-on: ubuntu-latest   # GitHub 提供的免費 Ubuntu 環境

    steps:
      # Step 1：下載程式碼
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      # Step 2：設定 Python 環境
      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3：快取 pip 套件（加快 CI 速度）
      # 套件沒變的話，直接用快取，不重新下載
      - name: 快取 pip 套件
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4：安裝套件
      - name: 安裝套件
        run: pip install -r requirements.txt

      # Step 5：設定環境變數（CI 環境用假的值）
      - name: 設定環境變數
        run: |
          echo "SECRET_KEY=ci-test-secret-key-not-real" >> $GITHUB_ENV
          echo "DEBUG=False" >> $GITHUB_ENV
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV
          echo "DB_NAME=test" >> $GITHUB_ENV
          echo "DB_USER=test" >> $GITHUB_ENV
          echo "DB_PASSWORD=test" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "AI_PROVIDER=mock" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=test" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=test" >> $GITHUB_ENV

      # Step 6：執行測試（用 testing settings）
      - name: 執行測試
        run: |
          pytest --cov=. --cov-report=xml --cov-fail-under=70 \
              --settings=config.settings.testing -v

      # Step 7：確認 Django 設定正確
      - name: Django 系統檢查
        run: |
          python manage.py check --settings=config.settings.testing

  docker-build:
    name: 確認 Docker Image 可以 Build
    runs-on: ubuntu-latest
    needs: test    # 測試通過才執行這個 job

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image(只 build，不 push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false    # CI 只確認能 build，不推送
          tags: diet-ai-system:test
          cache-from: type=gha    # 使用 GitHub Actions 快取
          cache-to: type=gha,mode=max